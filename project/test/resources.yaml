tags:
  student-id: "s2264323"
  course: "gcu-cloudPlatformDevelopment"
  application: "labelAndFaceDetectionSystem"

email: "ebury300@caledonian.ac.uk"

resources:
  ec2:
    upload-image: 
      name: "ec2-upload-s2264323"
      ami-name: "/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64"
      instance-profile: "LabUser"
      instance-type: "t3.micro"
      min-count: 1
      max-count: 1
      security-group: "test"
  s3:
    image-bucket:
      name: "bucket-images-s2264323"
  lambda:
    image-detection: 
      name: "lambda-detection-s2264323"
      role: "arn:aws:iam::232374568158:role/LabRole"
      runtime: "python3.14"
      handler: "app.lambda_handler"
    send-email:
      name: "lambda-email-s2264323"
      role: "arn:aws:iam::232374568158:role/LabRole"
      runtime: "python3.14"
      handler: "app.lambda_handler"
  sqs:
    notify-image:
      name: "queue-images-s2264323"
  sns:
    email-topic:
      name: "email-topic-s2264323"
  dynamodb:
    images-db:
      name: "dynamodb-images-s2264323"
      partition-key: "name"
      partition-key-type: "S"
  cloudformation:
    image-bucket-queue:
      name: "stack-images-s2264323"